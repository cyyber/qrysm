# Full configuration reference [here](https://github.com/theQRL/qrl-package?tab=readme-ov-file#configuration).
participants:
  - el_type: gqrl
    el_image: qrledger/go-qrl:stable
    cl_type: qrysm
    cl_image: qrledger/qrysm:beacon-chain-latest
    cl_extra_params:
      - "--min-sync-peers=0"
      - "--minimum-peers-per-subnet=0"
      - "--sync-from=head"
    # local build
    # cl_image: theqrl-dev/qrysm-beacon-chain:latest
    vc_type: qrysm
    vc_image: qrledger/qrysm:validator-latest
    # local build
    # vc_image: theqrl-dev/qrysm-validator:latest
    count: 2
    # use_remote_signer: true
    # remote_signer_type: clef
network_params:
  preset: "mainnet"
  prefunded_accounts: '{"Qf9f134ba1149f2e2edc94d17138c3bd0dbbaf703a6e6501938fd774545d52e20fce8cc0856c6f3fb7d9927ccd07542bc": {"balance": "2000000QRL"}, "Q91c2f58c52154bf1b9fad7a7fce5f2b92c6747add1f165a9285f72ab429c9848972387af6420b9af94480fd92231de8f": {"balance": "2000000QRL"}}' # tx spammer/clef accounts
  light_kdf_enabled: True
